<!DOCTYPE html>
<html>
<head>
    <title>QR Generator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            background: black;
            color: white;
            border-radius: 8px;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>
<body>

    <a href="/generate">
        <button>Generate QR Code</button>
    </a>

</body>
</html>
